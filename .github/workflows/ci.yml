name: CI

on:
  push:
    branches: ["main", "feature/**"]
    paths:
      - "Bookanizer.REST/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main", "feature/**"]
    paths:
      - "Bookanizer.REST/**"
      - ".github/workflows/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bookanizer
          POSTGRES_USER: bookanizer
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookanizer -d bookanizer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: bookanizer
      POSTGRES_USERNAME: bookanizer
      POSTGRES_PASSWORD: ci_password
      
    defaults:
      run:
        working-directory: ./Bookanizer.REST

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "GitHubActions"
