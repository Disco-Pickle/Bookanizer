name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "Bookanizer.REST/**"
  pull_request:
    branches: ["main"]
    paths:
      - "Bookanizer.REST/**"

jobs:
  build-and-test:
    name: Build & Test - REST API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Bookanizer.REST

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "GitHubActions"
